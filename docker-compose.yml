services:
  postgres:
    image: postgres:16-alpine
    container_name: mmotors_postgres
    environment:
      POSTGRES_DB: mmotors
      POSTGRES_USER: mmotors
      POSTGRES_PASSWORD: mmotors_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmotors -d mmotors"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: mmotors_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mmotors:mmotors_dev_password@postgres:5432/mmotors
      JWT_SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
      UPLOAD_DIR: /app/data/uploads
      DATA_DIR: /app/data
    volumes:
      - api_uploads:/app/data/uploads
      - api_data:/app/data
    ports:
      - "8000:8000"

  front:
    build: ./frontend
    container_name: mmotors_front
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: mmotors_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    container_name: mmotors_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  api_uploads:
  api_data:
  grafana_data:
